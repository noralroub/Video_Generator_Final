<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Frame</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          Arial, sans-serif;
      }

      body {
        margin: 0;
        padding: 0;
        background: #0b1020;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .frame-root {
        width: 360px;
        height: 640px;
        max-width: 100vw;
        max-height: 100vh;
        aspect-ratio: 9 / 16;
        border-radius: 24px;
        padding: 24px 20px;
        box-sizing: border-box;
        overflow: hidden;
        position: relative;
        background: radial-gradient(circle at top, #1b2340, #050712);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.65);
        color: #f9fafb;
      }

      .frame-root.theme-light {
        background: radial-gradient(circle at top, #ffffff, #e5ecff);
        color: #0b1020;
      }

      .frame-root.theme-dark {
        background: radial-gradient(circle at top, #050712, #03040a);
        color: #f9fafb;
      }

      .frame-root.theme-journal_brand::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, #0ea5e9, #6366f1);
        opacity: 0.14;
        pointer-events: none;
      }

      .frame-content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        gap: 12px;
      }

      .badge {
        align-self: flex-start;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: rgba(15, 23, 42, 0.7);
        color: #e5e7eb;
        backdrop-filter: blur(10px);
      }

      .theme-light .badge {
        background: rgba(15, 23, 42, 0.07);
        color: #111827;
      }

      .headline {
        font-size: 22px;
        line-height: 1.2;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-top: 4px;
      }

      .body {
        margin-top: 6px;
        font-size: 14px;
        line-height: 1.5;
        color: rgba(249, 250, 251, 0.88);
      }

      .theme-light .body {
        color: rgba(15, 23, 42, 0.86);
      }

      .accent {
        margin-top: auto;
        padding: 10px 12px;
        border-radius: 16px;
        font-size: 12px;
        line-height: 1.4;
        background: radial-gradient(circle at top left, #22c55e33, #22c55e11);
        border: 1px solid rgba(34, 197, 94, 0.45);
        color: #bbf7d0;
      }

      .theme-light .accent {
        background: radial-gradient(circle at top left, #0369a166, #0369a11a);
        border-color: rgba(37, 99, 235, 0.46);
        color: #0b1120;
      }

      .accent:empty {
        display: none;
      }

      .footer {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 11px;
        opacity: 0.72;
      }

      .progress-pill {
        width: 96px;
        height: 4px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.55);
        overflow: hidden;
      }

      .theme-light .progress-pill {
        background: rgba(15, 23, 42, 0.12);
      }

      .progress-inner {
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #22c55e, #a3e635);
      }

      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .anim-fade {
        animation: fade-in-up 600ms ease-out both;
      }

      .anim-slide_up {
        animation: fade-in-up 700ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }
    </style>
  </head>
  <body>
    <div
      class="frame-root theme-{{ theme }} layout-{{ layout }} anim-{{ animation }}"
    >
      <div class="frame-content">
        <div class="badge">Research story</div>
        <div class="headline">
          {{ headline }}
        </div>
        <div class="body">
          {{ body }}
        </div>
        <div class="accent">
          {{ accent_text }}
        </div>
        <div class="footer">
          <span>Auto-generated from paper</span>
          <div class="progress-pill">
            <div class="progress-inner"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
